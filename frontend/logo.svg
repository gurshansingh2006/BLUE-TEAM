<svg width="50" height="50" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4ff;stop-opacity:1" />
    </linearGradient>
    <filter id="sharpEdge">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0" />
    </filter>
  </defs>

  <!-- Refined, broader shield shape with sharp edges -->
  <path d="M25 2 L40 6 L40 22 C40 34 32 43 25 46 C18 43 10 34 10 22 L10 6 Z"
        fill="url(#shieldGradient)"
        stroke="#ffffff"
        stroke-width="1"
        stroke-linejoin="miter"
        filter="url(#sharpEdge)"/>

  <!-- Inner highlight for depth -->
  <path d="M26 3 L38 6.5 L38 22 C38 32 31 40 25 43.5 C20 40 12.5 32 12.5 22 L12.5 7 Z"
        fill="none"
        stroke="rgba(255,255,255,0.25)"
        stroke-width="0.8"
        stroke-linejoin="miter"/>

  <!-- Centered lock group -->
  <g transform="translate(25, 25)">
    <!-- Lock body (main rectangle) -->
    <rect x="-5" y="-1" width="10" height="8.5" rx="1.6" ry="1.6" 
          fill="url(#lockGradient)" 
          stroke="#667eea" 
          stroke-width="1"/>
    
    <!-- Lock shackle (top curved part) -->
    <path d="M-3.5 -1 Q-3.5 -5 0 -5 Q3.5 -5 3.5 -1" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="1.5" 
          stroke-linecap="round"
          stroke-linejoin="round"/>
    
    <!-- Keyhole dot -->
    <circle cx="0" cy="1.5" r="1.2" fill="#667eea"/>
    
    <!-- Keyhole stem -->
    <rect x="-0.4" y="3" width="0.8" height="2.5" fill="#667eea" rx="0.4"/>
  </g>
  </g>
</svg>